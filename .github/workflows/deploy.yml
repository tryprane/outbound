name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  APP_NAME: outbound

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-web:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-worker:latest

      - name: Build and push scraper image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/scraper
          file: ./apps/scraper/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-scraper:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-scraper:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on VPS over SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            export WEB_IMAGE='${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-web:${{ github.sha }}'
            export WORKER_IMAGE='${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-worker:${{ github.sha }}'
            export SCRAPER_IMAGE='${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_NAME }}-scraper:${{ github.sha }}'
            export DEPLOY_REF='${{ github.ref_name }}'
            export POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}'
            export PUBLIC_URL='${{ vars.PUBLIC_URL }}'
            export NEXTAUTH_SECRET='${{ secrets.NEXTAUTH_SECRET }}'
            export ADMIN_EMAIL='${{ secrets.ADMIN_EMAIL }}'
            export ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}'
            export ENCRYPTION_KEY='${{ secrets.ENCRYPTION_KEY }}'
            export GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}'
            export GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}'
            export ZOHO_CLIENT_ID='${{ secrets.ZOHO_CLIENT_ID }}'
            export ZOHO_CLIENT_SECRET='${{ secrets.ZOHO_CLIENT_SECRET }}'
            export GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'
            export GHCR_USERNAME='${{ vars.GHCR_USERNAME }}'
            export GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}'
            export GHCR_EMAIL='${{ secrets.GHCR_EMAIL }}'
            export REPLY_ANALYSIS_HOST_IP='${{ vars.REPLY_ANALYSIS_HOST_IP }}'
            export REPLY_ANALYSIS_BASE_URL='${{ vars.REPLY_ANALYSIS_BASE_URL }}'
            export REPLY_ANALYSIS_MODEL='${{ vars.REPLY_ANALYSIS_MODEL }}'
            export REPLY_ANALYSIS_TIMEOUT_MS='${{ secrets.REPLY_ANALYSIS_TIMEOUT_MS }}'
            export REPLY_ANALYSIS_MAX_TOKENS='${{ secrets.REPLY_ANALYSIS_MAX_TOKENS }}'
            export WORKER_GLOBAL_ACTIVE_LIMIT='${{ secrets.WORKER_GLOBAL_ACTIVE_LIMIT }}'
            export WORKER_SWEEP_INTERVAL_MS='${{ secrets.WORKER_SWEEP_INTERVAL_MS }}'
            export WORKER_IDLE_CLOSE_MS='${{ secrets.WORKER_IDLE_CLOSE_MS }}'
            export CAMPAIGN_WORKER_CONCURRENCY='${{ secrets.CAMPAIGN_WORKER_CONCURRENCY }}'
            export MAIL_WORKER_CONCURRENCY='${{ secrets.MAIL_WORKER_CONCURRENCY }}'
            export REPLY_ANALYSIS_WORKER_CONCURRENCY='${{ secrets.REPLY_ANALYSIS_WORKER_CONCURRENCY }}'
            export SCRAPE_WORKER_CONCURRENCY='${{ secrets.SCRAPE_WORKER_CONCURRENCY }}'
            export WHATSAPP_WORKER_CONCURRENCY='${{ secrets.WHATSAPP_WORKER_CONCURRENCY }}'
            export WARMUP_WORKER_CONCURRENCY='${{ secrets.WARMUP_WORKER_CONCURRENCY }}'
            export WHATSAPP_SESSION_WORKER_CONCURRENCY='${{ secrets.WHATSAPP_SESSION_WORKER_CONCURRENCY }}'
            export WHATSAPP_SESSION_KEEPALIVE='${{ secrets.WHATSAPP_SESSION_KEEPALIVE }}'
            if [[ ! -d /opt/outbound/.git ]]; then
              echo "Repo checkout missing at /opt/outbound. Clone it first." >&2
              exit 1
            fi
            cd /opt/outbound
            git fetch origin "${DEPLOY_REF}"
            git reset --hard "origin/${DEPLOY_REF}"
            bash deploy/scripts/remote-deploy.sh
