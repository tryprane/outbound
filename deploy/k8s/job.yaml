apiVersion: batch/v1
kind: Job
metadata:
  name: outbound-schema-sync
  namespace: outbound
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: outbound-schema-sync
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: schema-sync
          image: __WORKER_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["sh", "-lc", "npm run db:migrate:deploy"]
          envFrom:
            - secretRef:
                name: outbound-env
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
