apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbound-web
  namespace: outbound
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outbound-web
  template:
    metadata:
      labels:
        app: outbound-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: __WEB_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: outbound-env
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: outbound-env
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: outbound-env
                  key: REDIS_URL
            - name: SCRAPER_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: outbound-env
                  key: SCRAPER_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: outbound-web
  namespace: outbound
spec:
  selector:
    app: outbound-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbound-worker
  namespace: outbound
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outbound-worker
  template:
    metadata:
      labels:
        app: outbound-worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: __WORKER_IMAGE__
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: outbound-env
          env:
            - name: WHATSAPP_SESSION_DIR
              value: /whatsapp-sessions
          volumeMounts:
            - name: whatsapp-sessions
              mountPath: /whatsapp-sessions
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
      volumes:
        - name: whatsapp-sessions
          persistentVolumeClaim:
            claimName: outbound-whatsapp-sessions
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbound-scraper
  namespace: outbound
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outbound-scraper
  template:
    metadata:
      labels:
        app: outbound-scraper
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: scraper
          image: __SCRAPER_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: outbound-scraper
  namespace: outbound
spec:
  selector:
    app: outbound-scraper
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: outbound-web
  namespace: outbound
spec:
  ingressClassName: traefik
  rules:
    - host: __INGRESS_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: outbound-web
                port:
                  number: 3000
